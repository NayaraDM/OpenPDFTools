<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<img src="https://tse2.mm.bing.net/th/id/OIP.LeH76_wKGbznqxY-Brl9MwHaE3?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Logo" class="logo">
    
<title>OpenPDFTools</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>

<body>

<header>
    <h1>📄 OpenPDFTools</h1>
    <p>Unir e extrair páginas de PDFs diretamente no navegador</p>
</header>

<main>

<section class="card">
    <h2>Juntar PDFs</h2>

    <input
        type="file"
        id="mergeFiles"
        multiple
        accept=".pdf">

    <button onclick="mergePDFs()">
        Juntar PDFs
    </button>

    <div id="mergeStatus"></div>
</section>

<section class="card">
    <h2>Extrair páginas</h2>

    <input
        type="file"
        id="extractFile"
        accept=".pdf">

    <input
        type="text"
        id="pages"
        placeholder="Ex: 1,3,5">

    <button onclick="extractPages()">
        Extrair páginas
    </button>

    <div id="extractStatus"></div>
</section>

</main>

<footer>
    OpenPDFTools © 2026
</footer>

<script src="script.js"></script>

</body>
</html>
